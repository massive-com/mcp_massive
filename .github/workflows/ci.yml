name: Validate Code Quality

permissions:
  contents: read

on:
  pull_request:
    branches:
      - 'master'

jobs:
  lint:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Run linter
        run: uv run just lint

      - name: Run tests
        run: uv run just test

      - name: Run e2e tests
        run: uv run pytest -m e2e -v tests

  test-windows:
    name: Windows Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run just test
