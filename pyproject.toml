[project]
name = "mcp_massive"
version = "1.0.3"
description = "Stocks, options & indices market data via Massive.com financial data API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "mcp>=1.26.0",
    "httpx>=0.28.0",
    "numpy>=2.4.2",
    "bm25s>=0.2.0",
    "snowballstemmer>=2.2.0",
    "python-dotenv>=1.2.1",
    "pydantic>=2.12.0",
    "sqlglot>=28.10.0",
]
license = "MIT"
keywords = ["finance", "market-data", "stocks", "forex", "crypto", "options", "mcp"]
[[project.authors]]
name = "Massive"
email = "support@massive.com"

[project.urls]
Homepage = "https://massive.com"
Repository = "https://github.com/massive-com/mcp_massive"
Issues = "https://github.com/massive-com/mcp_massive/issues"

[build-system]
requires = [ "hatchling",]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ruff>=0.13.2",
    "pytest>=8.4.0",
    "pytest-asyncio>=1.0.0",
    "rust-just>=1.42.4",
]

[project.scripts]
mcp_massive = "mcp_massive:main"
