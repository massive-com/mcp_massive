[project]
name = "mcp_massive"
version = "0.8.0"
description = "A MCP server project"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.15.0",
    "httpx>=0.28.0",
    "numpy>=1.24.0",
    "bm25s>=0.2.0",
    "snowballstemmer>=2.2.0",
    "python-dotenv>=1.2.0",
    "pydantic>=2.0.0",
    "sqlglot>=26.0.0",
]
[[project.authors]]
name = "Massive"
email = "support@massive.com"

[build-system]
requires = [ "hatchling",]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "ruff>=0.13.2",
    "pytest>=8.4.0",
    "pytest-asyncio>=1.0.0",
    "rust-just>=1.42.4",
]

[project.scripts]
mcp_massive = "mcp_massive:main"
